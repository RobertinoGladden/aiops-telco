# =============================================================
# TELCO AIOPS — Tahap 2: Airflow via Docker Compose
# Jalankan: docker-compose up -d
# Airflow UI: http://localhost:8080  (admin / telco123)
# =============================================================

version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.0
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    # Agar Airflow bisa akses MinIO
    AWS_ACCESS_KEY_ID: telcoadmin
    AWS_SECRET_ACCESS_KEY: telcopassword123
    MINIO_ENDPOINT: http://telco-minio:9000
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  depends_on:
    airflow-postgres:
      condition: service_healthy
  networks:
    - telco-aiops-network

services:

  # ── Database untuk Airflow ───────────────────────────────
  airflow-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    networks:
      - telco-aiops-network

  # ── Airflow Init: setup database ─────────────────────────
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        airflow db init &&
        airflow users create
          --username admin
          --firstname Telco
          --lastname Admin
          --role Admin
          --email admin@telco.com
          --password telco123
      "
    restart: "no"

  # ── Airflow Webserver: UI ─────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── Airflow Scheduler: jalankan DAG ─────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped

volumes:
  airflow-postgres-data:

networks:
  telco-aiops-network:
    external: true
    name: telco-aiops-network
